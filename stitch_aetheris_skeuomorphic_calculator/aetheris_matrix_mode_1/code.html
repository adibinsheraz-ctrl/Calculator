<!DOCTYPE html>

<title>Aetheris OS - Matrix Mode</title>

<style>
        /* Titanium Matte Noise Texture */
        .titanium-grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }
        
        /* LCD Glow and Scanlines */
        .lcd-glow {
            filter: drop-shadow(0 0 6px rgba(0, 230, 57, 0.4));
        }
        .scanlines {
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        
        /* Haptic Button Shadows */
        .btn-surface {
            box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.08), 2px 2px 5px rgba(0, 0, 0, 0.6);
            transition: all 0.05s ease-out;
        }
        .btn-surface:active {
            transform: translateY(1px) translateX(1px);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.5), 0px 0px 0px rgba(0, 0, 0, 0.6);
        }
        
        /* Recessed Display Shadow */
        .recessed-display {
            box-shadow: inset 4px 4px 12px rgba(0, 0, 0, 0.9), inset -1px -1px 3px rgba(255, 255, 255, 0.05);
        }
        
        /* Screw Head Details */
        .screw-head {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.8), 0.5px 0.5px 1px rgba(255,255,255,0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface flex flex-col h-screen overflow-hidden selection:bg-tertiary/30">
<!-- App Chassis Background -->
<div class="absolute inset-0 bg-surface titanium-grain pointer-events-none z-[-1]"></div>
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-bezel-margin h-16 bg-surface dark:bg-surface shadow-[inset_0_-1px_0_0_rgba(255,255,255,0.05)] docked full-width top-0 z-10">
<button class="text-on-surface-variant hover:text-tertiary transition-colors active:scale-95 duration-100 flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="settings_applications">settings_applications</span>
</button>
<div class="flex flex-col items-center">
<h1 class="font-display-brand text-display-brand text-on-surface tracking-widest uppercase">Aetheris</h1>
</div>
<button class="text-on-surface-variant hover:text-tertiary transition-colors active:scale-95 duration-100 flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-bezel-margin pt-4 pb-[100px] overflow-hidden relative">
<!-- Hardware Screws (Decorative) -->
<div class="absolute top-2 left-6 w-2.5 h-2.5 rounded-full bg-surface-container-highest screw-head flex items-center justify-center rotate-45">
<div class="w-full h-px bg-black/60"></div>
<div class="h-full w-px bg-black/60 absolute"></div>
</div>
<div class="absolute top-2 right-6 w-2.5 h-2.5 rounded-full bg-surface-container-highest screw-head flex items-center justify-center -rotate-12">
<div class="w-full h-px bg-black/60"></div>
<div class="h-full w-px bg-black/60 absolute"></div>
</div>
<!-- Recessed LCD Display Area -->
<section class="recessed-display bg-surface-container-lowest rounded-xl relative p-display-padding flex flex-col justify-center min-h-[200px] mb-section-gutter overflow-hidden isolate">
<!-- Screen Glare / Environment reflection -->
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent z-10"></div>
<div class="absolute inset-0 scanlines z-10"></div>
<!-- LCD Header/Mode Indicator -->
<div class="absolute top-4 left-5 flex items-center gap-2 z-0">
<span class="font-label-small text-label-small text-tertiary opacity-80 uppercase tracking-widest">Mat[A]</span>
<span class="font-label-small text-label-small text-tertiary opacity-40 uppercase">3x3</span>
</div>
<!-- Matrix Grid -->
<div class="grid grid-cols-3 gap-x-8 gap-y-4 place-items-center mt-6 w-full max-w-[280px] mx-auto z-0 lcd-glow">
<!-- Row 1 -->
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center">
<span>1</span>
</div>
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center opacity-40">
<span>0</span>
</div>
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center opacity-40">
<span>0</span>
</div>
<!-- Row 2 -->
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center opacity-40">
<span>0</span>
</div>
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center">
<span>1</span>
</div>
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center opacity-40">
<span>0</span>
</div>
<!-- Row 3 -->
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center opacity-40">
<span>0</span>
</div>
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center opacity-40">
<span>0</span>
</div>
<div class="font-lcd-main text-lcd-main text-tertiary flex flex-col items-center">
<span class="animate-pulse">_</span>
</div>
</div>
<!-- Matrix Brackets (Decorative CSS) -->
<div class="absolute top-10 bottom-6 left-6 w-3 border-l-4 border-t-4 border-b-4 border-tertiary/30 rounded-l-sm z-0"></div>
<div class="absolute top-10 bottom-6 right-6 w-3 border-r-4 border-t-4 border-b-4 border-tertiary/30 rounded-r-sm z-0"></div>
</section>
<!-- Input Controls Area -->
<section class="flex-grow flex flex-col gap-button-gap">
<!-- Matrix Functions -->
<div class="grid grid-cols-4 gap-button-gap mb-2">
<button class="h-10 bg-surface-container-high rounded btn-surface font-button-label text-button-label text-primary">DET</button>
<button class="h-10 bg-surface-container-high rounded btn-surface font-button-label text-button-label text-primary">INV</button>
<button class="h-10 bg-surface-container-high rounded btn-surface font-button-label text-button-label text-primary">TRANS</button>

</div>
<!-- Numpad Matrix -->
<div class="grid grid-cols-4 gap-button-gap flex-grow">
<!-- Row 1 -->
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">7</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">8</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">9</button>
<button class="bg-surface-container-high rounded btn-surface font-button-label text-button-label text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-lg">backspace</span>
</button>
<!-- Row 2 -->
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">4</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">5</button>

<button class="bg-surface-container-high rounded btn-surface font-button-label text-button-label text-primary text-lg">×</button>
<!-- Row 3 -->
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">1</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">2</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">3</button>
<button class="bg-surface-container-high rounded btn-surface font-button-label text-button-label text-primary text-lg">-</button>
<!-- Row 4 -->
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">0</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">.</button>
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-on-surface text-lg">±</button>
<!-- Action Button -->
<button class="bg-surface-container rounded btn-surface font-button-label text-button-label text-tertiary text-lg border border-tertiary/20 shadow-[inset_1px_1px_1px_rgba(255,255,255,0.1),_0_0_8px_rgba(0,230,57,0.15),_2px_2px_4px_rgba(0,0,0,0.6)] active:shadow-[inset_2px_2px_4px_rgba(0,0,0,0.5),_0_0_4px_rgba(0,230,57,0.3)]">=</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-bezel-margin pb-6 pt-2 bg-surface border-t border-outline-variant shadow-[0_-4px_10px_rgba(0,0,0,0.5)] docked full-width rounded-t-xl">
<!-- Active: MATH -->
<button class="flex flex-col items-center justify-center text-tertiary bg-surface-container-highest rounded-xl shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6),inset_-1px_-1px_1px_rgba(255,255,255,0.1)] translate-y-px px-4 py-2 hover:bg-surface-container-high w-[72px]">

<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-button-label text-button-label">STATS</span>
</button>
<!-- Inactive: PROG -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 shadow-[2px_2px_0_rgba(255,255,255,0.05),-1px_-1px_2px_rgba(0,0,0,0.8)] hover:bg-surface-container-high rounded-xl transition-colors w-[72px]">
<span class="material-symbols-outlined mb-1" data-icon="terminal">terminal</span>
<span class="font-button-label text-button-label">PROG</span>
</button>
<!-- Inactive: GRAPH -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 shadow-[2px_2px_0_rgba(255,255,255,0.05),-1px_-1px_2px_rgba(0,0,0,0.8)] hover:bg-surface-container-high rounded-xl transition-colors w-[72px]">
<span class="material-symbols-outlined mb-1" data-icon="show_chart">show_chart</span>
<span class="font-button-label text-button-label">GRAPH</span>
</button>
</nav>
